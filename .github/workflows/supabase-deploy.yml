name: Deploy Supabase Migration

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/add_is_public.sql'
      - 'supabase/migrations/*.sql'

jobs:
  migrate:
    name: Run DB Migration via REST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run add_is_public migration
        run: |
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/run_sql" \
            -H "apikey: $SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"ALTER TABLE public.games ADD COLUMN IF NOT EXISTS is_public boolean NOT NULL DEFAULT false; ALTER TABLE public.games ALTER COLUMN name DROP NOT NULL; SELECT 'ok'\"}" \
            || echo "Migration via RPC non disponibile, skip"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  deploy-edge-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy run-migration function
        run: |
          supabase functions deploy run-migration \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Trigger run-migration to apply SQL
        run: |
          curl -s -X POST \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/run-migration" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
        continue-on-error: true
